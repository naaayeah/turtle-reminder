<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>거북이 알림</title>
<style>
:root {
  --font: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface2: #efefef;
  --border: rgba(0,0,0,0.08);
  --border-md: rgba(0,0,0,0.13);
  --label: #111111;
  --label2: #666666;
  --label3: #aaaaaa;
  --sep: rgba(0,0,0,0.07);
  --track-on: #111111;
  --track-off: rgba(0,0,0,0.15);
  --thumb: #ffffff;
  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --smooth: cubic-bezier(0.25,0.46,0.45,0.94);
}
[data-theme="dark"] {
  --bg: #1c1c1e;
  --surface: #2c2c2e;
  --surface2: #3a3a3c;
  --border: rgba(255,255,255,0.07);
  --border-md: rgba(255,255,255,0.12);
  --label: #f2f2f7;
  --label2: #aeaeb2;
  --label3: #636366;
  --sep: rgba(255,255,255,0.07);
  --track-on: #f2f2f7;
  --track-off: rgba(255,255,255,0.2);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; user-select:none; }
html, body { width:300px; background:transparent; font-family:var(--font); color:var(--label); overflow:hidden; }

.shell {
  width:300px;
  background:var(--bg);
  backdrop-filter:blur(40px) saturate(160%);
  -webkit-backdrop-filter:blur(40px) saturate(160%);
  border-radius:18px;
  border:0.5px solid var(--border-md);
  box-shadow:0 20px 60px rgba(0,0,0,0.15);
  overflow:hidden;
  padding:18px 18px 20px;
  animation:shellIn 0.22s var(--spring);
}
@keyframes shellIn { from{opacity:0;transform:scale(0.95) translateY(-6px)} to{opacity:1;transform:none} }

.header { display:flex; align-items:center; margin-bottom:28px; }
.app-name { font-size:14px; font-weight:500; letter-spacing:-0.2px; flex:1; }
.status-dot { width:6px; height:6px; border-radius:50%; background:var(--label3); transition:background 0.3s; }
.status-dot.on { background:var(--label); animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.timer { text-align:center; margin-bottom:18px; }
.timer-digits {
  font-size:52px; font-weight:300; letter-spacing:-3px;
  font-variant-numeric:tabular-nums; color:var(--label); line-height:1;
}

/* Track */
.track-wrap { margin-bottom:28px; position:relative; height:22px; display:flex; align-items:center; }
.track-bg { position:absolute; left:0; right:0; height:2px; background:var(--surface2); border-radius:1px; }
.track-remain { position:absolute; height:2px; background:var(--label); border-radius:1px; transition:left 1s linear, width 1s linear; }
.turtle { position:absolute; left:0; transition:left 1s linear; }

/* Presets */
.section-label { font-size:10px; color:var(--label3); letter-spacing:0.8px; text-transform:uppercase; margin-bottom:10px; }
.presets { display:flex; gap:8px; margin-bottom:16px; }
.pbtn {
  flex:1; height:36px; border-radius:8px; border:0.5px solid var(--border-md);
  background:var(--surface); font-family:var(--font); font-size:13px; font-weight:500;
  color:var(--label2); cursor:pointer; transition:all 0.15s; -webkit-app-region:no-drag;
}
.pbtn.active { background:var(--label); color:var(--bg); border-color:var(--label); }

/* Stepper */
.stepper-card {
  background:var(--surface); border-radius:10px; border:0.5px solid var(--border);
  overflow:hidden; margin-bottom:20px;
}
.stepper-row {
  display:flex; align-items:center; padding:0 14px; height:48px;
  -webkit-app-region:no-drag;
}
.stepper-row + .stepper-row { border-top:0.5px solid var(--sep); }
.stepper-label { font-size:13px; color:var(--label); flex:1; }
.stepper-btn {
  width:30px; height:30px; border-radius:50%; border:0.5px solid var(--border-md);
  background:var(--surface2); font-size:18px; color:var(--label); cursor:pointer;
  display:flex; align-items:center; justify-content:center; line-height:1;
  font-family:var(--font); transition:all 0.12s; -webkit-app-region:no-drag;
}
.stepper-btn:active { transform:scale(0.92); }
.stepper-val {
  font-size:17px; font-weight:500; font-variant-numeric:tabular-nums;
  color:var(--label); width:34px; text-align:center;
}

/* Divider */
.divider { height:0.5px; background:var(--sep); margin:0 0 16px; }

/* Sound */
.sound-row { display:flex; align-items:center; margin-bottom:16px; -webkit-app-region:no-drag; }
.sound-label { font-size:13px; color:var(--label); flex:1; }
.toggle { position:relative; width:40px; height:24px; cursor:pointer; -webkit-app-region:no-drag; }
.toggle input { display:none; }
.toggle-track { width:40px; height:24px; border-radius:100px; background:var(--track-on); position:relative; transition:background 0.25s; }
.toggle-thumb { position:absolute; top:2px; left:18px; width:20px; height:20px; border-radius:50%; background:var(--thumb); box-shadow:0 1px 4px rgba(0,0,0,0.22); transition:left 0.25s var(--spring); }
.toggle input:not(:checked) + .toggle-track { background:var(--track-off); }
.toggle input:not(:checked) + .toggle-track .toggle-thumb { left:2px; }

/* Main button */
.main-btn {
  width:100%; height:42px; border:none; border-radius:10px;
  font-family:var(--font); font-size:14px; font-weight:500; cursor:pointer;
  background:var(--label); color:var(--bg); transition:all 0.15s; -webkit-app-region:no-drag;
}
.main-btn.stop { background:var(--surface2); color:var(--label); border:0.5px solid var(--border-md); }
</style>
</head>
<body>
<div class="shell" id="shell">

  <div class="header">
    <span class="app-name">거북이 알림</span>
    <span class="status-dot" id="statusDot"></span>
  </div>

  <div class="timer">
    <div class="timer-digits" id="timerDigits">30:00</div>
  </div>

  <!-- Track -->
  <div class="track-wrap" id="trackWrap">
    <div class="track-bg"></div>
    <div class="track-remain" id="trackRemain"></div>
    <div class="turtle" id="turtle">
      <svg width="26" height="18" viewBox="0 0 26 18" fill="none">
        <ellipse cx="13" cy="10" rx="8" ry="5.5" fill="var(--label)"/>
        <ellipse cx="13" cy="9.5" rx="6" ry="4.5" fill="var(--bg)" stroke="var(--label)" stroke-width="1.1"/>
        <ellipse cx="13" cy="9.5" rx="2.8" ry="2" fill="var(--label)" opacity="0.12"/>
        <line x1="13" y1="5.2" x2="13" y2="13.5" stroke="var(--label)" stroke-width="0.7" opacity="0.18"/>
        <line x1="7.2" y1="9.5" x2="18.8" y2="9.5" stroke="var(--label)" stroke-width="0.7" opacity="0.18"/>
        <ellipse cx="20.5" cy="9.5" rx="2.8" ry="2" fill="var(--label)"/>
        <circle cx="21.8" cy="8.8" r="0.6" fill="var(--bg)"/>
        <ellipse cx="18.5" cy="14.5" rx="1.6" ry="0.9" fill="var(--label)" transform="rotate(-20 18.5 14.5)"/>
        <ellipse cx="7.5" cy="14.5" rx="1.6" ry="0.9" fill="var(--label)" transform="rotate(20 7.5 14.5)"/>
        <ellipse cx="4.8" cy="10.2" rx="2" ry="1.1" fill="var(--label)" transform="rotate(10 4.8 10.2)"/>
      </svg>
    </div>
  </div>

  <!-- Presets -->
  <div class="section-label">빠른 선택</div>
  <div class="presets">
    <button class="pbtn" onclick="pickPreset(15,this)">15분</button>
    <button class="pbtn active" onclick="pickPreset(30,this)">30분</button>
    <button class="pbtn" onclick="pickPreset(60,this)">1시간</button>
  </div>

  <!-- Stepper -->
  <div class="section-label">세부 조정</div>
  <div class="stepper-card">
    <div class="stepper-row">
      <span class="stepper-label">시간</span>
      <button class="stepper-btn" onclick="adjust('H',-1)">−</button>
      <span class="stepper-val" id="valH">0</span>
      <button class="stepper-btn" onclick="adjust('H',+1)">+</button>
    </div>
    <div class="stepper-row">
      <span class="stepper-label">분</span>
      <button class="stepper-btn" onclick="adjust('M',-1)">−</button>
      <span class="stepper-val" id="valM">30</span>
      <button class="stepper-btn" onclick="adjust('M',+1)">+</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Sound -->
  <div class="sound-row">
    <span class="sound-label">사운드</span>
    <label class="toggle">
      <input type="checkbox" id="soundToggle" checked onchange="onSoundToggle()">
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </label>
  </div>

  <div class="divider"></div>

  <button class="main-btn" id="mainBtn" onclick="toggleTimer()">시작</button>

</div>

<script>
const TURTLE_W = 26;
let selH=0, selM=30, soundOn=true;
let isRunning=false, countdown=0, totalSecs=0, ticker=null;
let alertAudio = null;

// Audio
function initAudio() {
  alertAudio = new Audio('../assets/alert.mp3');
  alertAudio.volume = 1.0;
}

function playAlert() {
  if (!soundOn || !alertAudio) return;
  alertAudio.currentTime = 0;
  alertAudio.play().catch(()=>{});
}

// Theme
async function initTheme() {
  const apply = t => document.getElementById('shell').setAttribute('data-theme', t);
  if (window.electronAPI) {
    apply(await window.electronAPI.getTheme());
    window.electronAPI.onThemeChange(apply);
  } else {
    const mq = window.matchMedia('(prefers-color-scheme: dark)');
    apply(mq.matches ? 'dark' : 'light');
    mq.addEventListener('change', e => apply(e.matches ? 'dark' : 'light'));
  }
}

function totalMins() { return selH*60+selM; }
function fmt(secs) {
  const m=Math.floor(secs/60), s=secs%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function syncDisplay() {
  document.getElementById('valH').textContent = selH;
  document.getElementById('valM').textContent = String(selM).padStart(2,'0');
  if (!isRunning) document.getElementById('timerDigits').textContent = fmt(totalMins()*60);
}

function getTrackW() {
  return document.getElementById('trackWrap').offsetWidth;
}

function resetTrack() {
  const tw = getTrackW();
  const turtle = document.getElementById('turtle');
  const remain = document.getElementById('trackRemain');
  turtle.style.transition = 'none';
  remain.style.transition = 'none';
  turtle.style.left = '0px';
  remain.style.left = TURTLE_W + 'px';
  remain.style.width = (tw - TURTLE_W) + 'px';
}

function updateTrack() {
  const tw = getTrackW();
  const elapsed = (totalSecs - countdown) / totalSecs;
  const turtleLeft = elapsed * (tw - TURTLE_W);
  const frontX = turtleLeft + TURTLE_W;
  const remainW = Math.max(0, tw - frontX);
  document.getElementById('turtle').style.left = turtleLeft + 'px';
  document.getElementById('trackRemain').style.left = frontX + 'px';
  document.getElementById('trackRemain').style.width = remainW + 'px';
}

function adjust(which, delta) {
  if (which==='H') selH = Math.max(0, Math.min(3, selH+delta));
  else selM = Math.max(0, Math.min(59, selM+delta));
  syncDisplay();
  clearPreset();
  if (isRunning) { stopTimer(); startTimer(); }
}

function pickPreset(mins, btn) {
  selH = Math.floor(mins/60);
  selM = mins%60;
  syncDisplay();
  clearPreset();
  btn.classList.add('active');
  if (isRunning) { stopTimer(); startTimer(); }
}

function clearPreset() {
  document.querySelectorAll('.pbtn').forEach(b => b.classList.remove('active'));
}

function onSoundToggle() {
  soundOn = document.getElementById('soundToggle').checked;
}

function toggleTimer() { isRunning ? stopTimer() : startTimer(); }

function startTimer() {
  if (!totalMins()) return;
  isRunning = true;
  totalSecs = totalMins() * 60;
  countdown = totalSecs;
  document.getElementById('turtle').style.transition = 'left 1s linear';
  document.getElementById('trackRemain').style.transition = 'left 1s linear, width 1s linear';
  if (window.electronAPI) window.electronAPI.timerStart();
  setUI(true);
  tick();
  ticker = setInterval(tick, 1000);
}

function stopTimer() {
  isRunning = false;
  clearInterval(ticker);
  if (window.electronAPI) window.electronAPI.timerStop();
  setUI(false);
}

function tick() {
  document.getElementById('timerDigits').textContent = fmt(countdown);
  updateTrack();
  if (countdown <= 0) { fireAlert(); countdown = totalSecs; }
  else countdown--;
}

function setUI(on) {
  if (!on) {
    document.getElementById('timerDigits').textContent = fmt(totalMins()*60);
    resetTrack();
  }
  document.getElementById('statusDot').className = 'status-dot' + (on ? ' on' : '');
  const btn = document.getElementById('mainBtn');
  btn.textContent = on ? '정지' : '시작';
  btn.className = 'main-btn' + (on ? ' stop' : '');
}

function fireAlert() {
  playAlert();
  if (window.electronAPI) window.electronAPI.showBanner();
}

initTheme();
initAudio();
syncDisplay();
setTimeout(resetTrack, 50);
</script>
</body>
</html>
